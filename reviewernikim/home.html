<style>
  /* BODY STYLING */
  body { 
    font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding: 20px;

    color: #333;
  }

  @keyframes gradientBG {
    0% {background-position:0% 50%;}

  }

  h1 {
    text-align: center;
    font-size: 2.4em;
    color: #fff;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
    margin-bottom: 30px;
    letter-spacing: 1px;
  }

  /* QUIZ CONTAINER */
  .quiz-container { 
    max-width: 750px;
    margin: auto;
    background: #fff;
    padding: 30px 35px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .quiz-container:hover {
    transform: translateY(-8px) scale(1.01);
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  }

  /* QUESTION */
  .question { 
    font-size: 1.35em; 
    margin-bottom: 25px; 
    font-weight: 700;
    color: #8e24aa; /* deep purple */
    line-height: 1.5;
  }

  /* OPTIONS BUTTONS */
  .options button { 
    display: block;
    margin: 10px 0;
    padding: 14px;
    width: 100%;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-size: 1.05em;
    font-weight: 500;
    background: linear-gradient(120deg, #f3e5f5, #e1bee7);
    color: #6a1b9a;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.4s ease, transform 0.2s ease;
  }
  .options button:hover { 
    background: linear-gradient(120deg, #ce93d8, #ba68c8);
    color: #fff;
    transform: scale(1.05) translateX(3px);
  }
  .options button:focus {
    outline: none;
    box-shadow: 0 0 0 4px rgba(186,104,200,0.3);
  }

  /* SHOW ANSWER */
  /* SHOW ANSWER */
.answer { 
    margin-top: 20px; 
    font-weight: bold; 
    font-size: 1.15em;
    padding: 12px 15px; 
    border-radius: 12px;
    display: none;
    animation: fadeIn 0.5s ease forwards;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
}

/* Correct answer styling */
.answer.correct {
    color: #2e7d32; /* green */
    background: #e8f5e9;
    border-left: 6px solid #66bb6a;
}

/* Wrong answer styling */
.answer.wrong {
    color: #c62828; /* red */
    background: #ffebee;
    border-left: 6px solid #e53935;
}


  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(-5px);}
    to {opacity: 1; transform: translateY(0);}
  }

  /* NAVIGATION BUTTONS */
  .nav-btns { 
    margin-top: 30px; 
    text-align: right;
  }
  .nav-btns button { 
    padding: 12px 28px; 
    margin-left: 12px; 
    border: none; 
    border-radius: 20px; 
    cursor: pointer; 
    background: linear-gradient(135deg, #ba68c8, #8e24aa);
    color: #fff; 
    font-weight: 600;
    font-size: 1em;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    transition: 0.3s ease, transform 0.2s ease;
  }
  .nav-btns button:hover { 
    background: linear-gradient(135deg, #9c27b0, #7b1fa2); 
    transform: scale(1.08);
  }

  /* RESPONSIVE */
  @media screen and (max-width: 500px) {
    .quiz-container {
      padding: 20px;
    }
    h1 {
      font-size: 2em;
    }

    }

      padding: 12px;
      font-size: 1em;
    }
    .nav-btns button {
      padding: 10px 20px;
      font-size: 0.95em;
    }
  }
</style>

let currentQuestion = 0;
let answered = new Array(quiz.length).fill(false);

function loadQuestion() {
  const q = quiz[currentQuestion];
  document.getElementById('question').innerText = q.question;
  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.innerText = opt;
    btn.onclick = () => showAnswer(opt);
    optionsDiv.appendChild(btn);
  });

  const ansDiv = document.getElementById('answer');
  if (answered[currentQuestion]) {
    ansDiv.style.display = 'block';
  } else {
    ansDiv.style.display = 'none';
    ansDiv.innerText = '';
  }

  document.getElementById('prev-btn').style.display = currentQuestion === 0 ? 'none' : 'inline-block';
}

function showAnswer(selected) {
  const ansDiv = document.getElementById('answer');
  const q = quiz[currentQuestion];
  ansDiv.classList.remove('correct', 'wrong'); // reset classes

  if (selected === q.answer) {
    ansDiv.classList.add('correct');
    ansDiv.innerText = "Correct! ✅ " + q.answer;
  } else {
    ansDiv.classList.add('wrong');
    ansDiv.innerText = "Wrong ❌. Correct answer: " + q.answer;
  }
  ansDiv.style.display = 'block';
  answered[currentQuestion] = true;
}


document.getElementById('next-btn').onclick = () => {
  if (currentQuestion < quiz.length - 1) {
    currentQuestion++;
    loadQuestion();
  } else {
    alert("You've reached the last question!");
  }
}

document.getElementById('prev-btn').onclick = () => {
  if (currentQuestion > 0) {
    currentQuestion--;
    loadQuestion();
  }
}

loadQuestion();
</script>
